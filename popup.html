<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 12px;
      font-family: sans-serif;
      font-size: 13px;
    }
    h3 { margin: 0 0 8px; font-size: 14px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 5px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 7px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #c0392b; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h3>🗑️ 내 댓글 삭제</h3>
  <label>닉네임</label>
  <input type="text" id="nickname" placeholder="예: 큐르">
  <button id="deleteBtn">이 페이지 내 댓글 모두 삭제</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
